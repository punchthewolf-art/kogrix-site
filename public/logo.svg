<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="globeGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="kGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Sphere wireframe - vertical meridian lines -->
  <!-- Each line is an elliptical arc from top to bottom of sphere -->

  <!-- Outer circle -->
  <ellipse cx="100" cy="100" rx="72" ry="72" stroke="url(#globeGrad)" stroke-width="1.2" fill="none" opacity="0.9"/>

  <!-- Vertical meridian lines (longitude) - left side -->
  <ellipse cx="100" cy="100" rx="6" ry="72" stroke="url(#globeGrad)" stroke-width="1.1" fill="none" opacity="0.7"/>
  <ellipse cx="100" cy="100" rx="16" ry="72" stroke="url(#globeGrad)" stroke-width="1.1" fill="none" opacity="0.75"/>
  <ellipse cx="100" cy="100" rx="26" ry="72" stroke="url(#globeGrad)" stroke-width="1.1" fill="none" opacity="0.8"/>
  <ellipse cx="100" cy="100" rx="36" ry="72" stroke="url(#globeGrad)" stroke-width="1.1" fill="none" opacity="0.85"/>
  <ellipse cx="100" cy="100" rx="46" ry="72" stroke="url(#globeGrad)" stroke-width="1.1" fill="none" opacity="0.85"/>
  <ellipse cx="100" cy="100" rx="55" ry="72" stroke="url(#globeGrad)" stroke-width="1.1" fill="none" opacity="0.9"/>
  <ellipse cx="100" cy="100" rx="64" ry="72" stroke="url(#globeGrad)" stroke-width="1.1" fill="none" opacity="0.9"/>

  <!-- Center vertical line -->
  <line x1="100" y1="28" x2="100" y2="172" stroke="url(#globeGrad)" stroke-width="1.2" opacity="0.8"/>

  <!-- K letter - bold, centered -->
  <!-- Vertical stroke of K -->
  <line x1="82" y1="68" x2="82" y2="132" stroke="url(#kGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Upper diagonal of K -->
  <line x1="84" y1="100" x2="118" y2="68" stroke="url(#kGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Lower diagonal of K -->
  <line x1="84" y1="100" x2="118" y2="132" stroke="url(#kGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Small accent dots at K endpoints for tech feel -->
  <circle cx="118" cy="68" r="2" fill="#A7F3D0" opacity="0.8"/>
  <circle cx="118" cy="132" r="2" fill="#6EE7B7" opacity="0.6"/>
</svg>
